name: Sync della repo su più Space HF

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Restart Space gerghi57
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -v \
            "https://huggingface.co/api/spaces/gerghi57/cosinopiccolino/restart?factory=true"

      - name: Restart Space signorie
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN_TOPETTA }}" \
            -v \
            "https://huggingface.co/api/spaces/signorie/topetta/restart?factory=true"
