name: Sync della repo sullo Space HF

env:
  HF_USERNAME: gerghi57
  HF_SPACE: cosinopiccolino
  HF_USERNAME_TOPETTA: signorie
  HF_SPACE_TOPETTA: topetta

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Request Factory Rebuild
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            "https://huggingface.co/api/spaces/${HF_USERNAME}/${HF_SPACE}/restart?factory=true"
        
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            "https://huggingface.co/api/spaces/${HF_USERNAME_TOPETTA}/${HF_SPACE_TOPETTA}/restart?factory=true"
